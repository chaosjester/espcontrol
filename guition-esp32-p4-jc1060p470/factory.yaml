# =============================================================================
# FACTORY FIRMWARE - Web Installer Build
# =============================================================================
# Secrets-free config for the ESPHome web installer. Boots into AP mode
# for WiFi setup via captive portal.
#
# Compiled by CI (see .github/workflows/release.yml) — not used locally.
# For local development, use esphome.yaml instead.
# =============================================================================

substitutions:
  name: "espcontrol-7inch"
  friendly_name: "Espcontrol 7inch"
  firmware_version: "0.0.0"

packages:
  espcontrol: !include package.yaml

web_server:
  port: 80
  version: 3
  js_url: ""
  js_include: "../docs/public/webserver/www.js"
