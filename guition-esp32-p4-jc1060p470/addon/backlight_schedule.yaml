# =============================================================================
# BACKLIGHT SCHEDULE - Day/Night Brightness via Home Assistant Sun Entity
# =============================================================================
# Automatic day/night brightness using HA's sun.sun state. When the sun is
# above the horizon, daytime brightness is applied; below → nighttime.
# =============================================================================

globals:
  - id: last_is_daytime
    type: bool
    initial_value: 'true'

# =============================================================================
# HOME ASSISTANT SUN STATE
# =============================================================================

text_sensor:
  - platform: homeassistant
    entity_id: sun.sun
    id: ha_sun_state
    internal: true
    on_value:
      then:
        - script.execute: backlight_apply_brightness

  - platform: homeassistant
    entity_id: sun.sun
    attribute: next_rising
    id: ha_sunrise_attr
    internal: true
    on_value:
      then:
        - lambda: |-
            auto s = id(ha_sunrise_attr).state;
            if (s.length() < 16) return;
            int h = std::stoi(s.substr(11, 2));
            int m = std::stoi(s.substr(14, 2));
            char buf[16];
            if (h == 0) snprintf(buf, sizeof(buf), "12:%02d AM", m);
            else if (h < 12) snprintf(buf, sizeof(buf), "%d:%02d AM", h, m);
            else if (h == 12) snprintf(buf, sizeof(buf), "12:%02d PM", m);
            else snprintf(buf, sizeof(buf), "%d:%02d PM", h - 12, m);
            id(sunrise_time_sensor).publish_state(buf);

  - platform: homeassistant
    entity_id: sun.sun
    attribute: next_setting
    id: ha_sunset_attr
    internal: true
    on_value:
      then:
        - lambda: |-
            auto s = id(ha_sunset_attr).state;
            if (s.length() < 16) return;
            int h = std::stoi(s.substr(11, 2));
            int m = std::stoi(s.substr(14, 2));
            char buf[16];
            if (h == 0) snprintf(buf, sizeof(buf), "12:%02d AM", m);
            else if (h < 12) snprintf(buf, sizeof(buf), "%d:%02d AM", h, m);
            else if (h == 12) snprintf(buf, sizeof(buf), "12:%02d PM", m);
            else snprintf(buf, sizeof(buf), "%d:%02d PM", h - 12, m);
            id(sunset_time_sensor).publish_state(buf);

  - platform: template
    name: "Screen: Sunrise"
    id: sunrise_time_sensor
    entity_category: diagnostic
    icon: "mdi:weather-sunset-up"
    web_server:
      sorting_group_id: sg_brightness

  - platform: template
    name: "Screen: Sunset"
    id: sunset_time_sensor
    entity_category: diagnostic
    icon: "mdi:weather-sunset-down"
    web_server:
      sorting_group_id: sg_brightness

# =============================================================================
# USER-CONFIGURABLE ENTITIES
# =============================================================================

number:
  - platform: template
    name: "Screen: Daytime Brightness"
    id: brightness_day
    min_value: 10
    max_value: 100
    step: 5
    initial_value: 100
    optimistic: true
    restore_value: true
    unit_of_measurement: "%"
    entity_category: config
    icon: "mdi:brightness-7"
    web_server:
      sorting_group_id: sg_brightness
    on_value:
      then:
        - script.execute: backlight_apply_brightness

  - platform: template
    name: "Screen: Nighttime Brightness"
    id: brightness_night
    min_value: 10
    max_value: 100
    step: 5
    initial_value: 75
    optimistic: true
    restore_value: true
    unit_of_measurement: "%"
    entity_category: config
    icon: "mdi:brightness-4"
    web_server:
      sorting_group_id: sg_brightness
    on_value:
      then:
        - script.execute: backlight_apply_brightness

# =============================================================================
# SCRIPTS
# =============================================================================

script:
  - id: backlight_apply_brightness
    mode: restart
    then:
      - lambda: |-
          if (id(display_asleep)) return;
          std::string sun = id(ha_sun_state).state;
          bool is_day = (sun != "below_horizon");
          id(last_is_daytime) = is_day;
          float pct = is_day ? id(brightness_day).state : id(brightness_night).state;
          float brightness = pct / 100.0f;
          auto call = id(display_backlight).turn_on();
          call.set_brightness(brightness);
          call.set_transition_length(500);
          call.perform();
