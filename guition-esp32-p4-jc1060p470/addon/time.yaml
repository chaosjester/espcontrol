# =============================================================================
# TIME - Home Assistant time source (automatic timezone)
# =============================================================================
# HA time drives the on-screen clock. Timezone is inherited from HA config.
# =============================================================================

time:
  - platform: homeassistant
    id: ha_time
    on_time_sync:
      - script.execute: time_update
    on_time:
      - minutes: '*'
        seconds: 0
        then:
          - script.execute: time_update

script:
  - id: time_update
    then:
      - lvgl.label.update:
          id: display_time
          text: !lambda |-
            static char time_buf[17];
            auto now = id(ha_time).now();
            snprintf(time_buf, sizeof(time_buf), "%02d:%02d", now.hour, now.minute);
            return time_buf;
