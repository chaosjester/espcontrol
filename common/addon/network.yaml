# =============================================================================
# NETWORK - Connectivity diagnostics exposed to Home Assistant
# =============================================================================
# Online status, uptime, WiFi signal strength (dB + %), and IP address.
# All sensors are diagnostic; signal dB is internal (used to derive %).
# =============================================================================

# ---------------------------------------------------------------------------
# Online status (binary_sensor)
# ---------------------------------------------------------------------------
binary_sensor:
  - platform: status
    name: "Online"
    id: ink_ha_connected
    icon: mdi:check-network

# ---------------------------------------------------------------------------
# Uptime and WiFi signal sensors
# ---------------------------------------------------------------------------
sensor:
  - platform: uptime
    name: "Uptime Sensor"
    id: uptime_sensor
    entity_category: diagnostic
    internal: true

  # Raw dBm value (internal, feeds the percentage copy below)
  - platform: wifi_signal
    name: "Wifi Signal dB"
    id: wifi_signal_db
    update_interval: 60s
    entity_category: "diagnostic"
    internal: true

  # Converted to 0-100% for easier reading in HA
  - platform: copy
    source_id: wifi_signal_db
    name: "Wifi Strength"
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "%"
    icon: mdi:wifi
    entity_category: "diagnostic"
    device_class: ""

# ---------------------------------------------------------------------------
# IP address (text_sensor)
# ---------------------------------------------------------------------------
text_sensor:
  - platform: wifi_info
    ip_address:
      name: IP Address
      icon: mdi:ip-network
