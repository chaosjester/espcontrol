# =============================================================================
# WEATHER - Pirate Weather current conditions
# =============================================================================
# Fetches current weather from the Pirate Weather API every 15 minutes using
# the API key and latitude/longitude stored in weather config entities. Parses
# the Dark Sky-style JSON response for icon, summary, and numeric fields.
# Device-specific sensors.yaml registers weather card widgets during Phase 1
# boot; this addon's interval updates them.
# =============================================================================

json:

globals:
  - id: weather_icon
    type: std::string
    initial_value: '""'
  - id: weather_label
    type: std::string
    initial_value: '""'
  - id: weather_url
    type: std::string
    initial_value: '""'
  - id: weather_fetched
    type: bool
    initial_value: 'false'
  - id: weather_temperature
    type: float
    initial_value: 'NAN'
  - id: weather_feels_like
    type: float
    initial_value: 'NAN'
  - id: weather_humidity
    type: float
    initial_value: 'NAN'
  - id: weather_wind
    type: float
    initial_value: 'NAN'
  - id: weather_precip
    type: float
    initial_value: 'NAN'
  - id: weather_cloud
    type: float
    initial_value: 'NAN'
  - id: weather_icon_lbl_ptrs
    type: std::vector<lv_obj_t*>
  - id: weather_text_lbl_ptrs
    type: std::vector<lv_obj_t*>
  - id: weather_sensor_lbl_ptrs
    type: std::vector<lv_obj_t*>
  - id: weather_feed_keys
    type: std::vector<std::string>

script:
  - id: weather_fetch
    mode: single
    then:
      - if:
          condition:
            lambda: |-
              return !id(weather_api_key).state.empty() &&
                     !id(weather_latitude).state.empty() &&
                     !id(weather_longitude).state.empty();
          then:
            - lambda: |-
                id(weather_url) = "https://api.pirateweather.net/forecast/" +
                  id(weather_api_key).state + "/" +
                  id(weather_latitude).state + "," + id(weather_longitude).state +
                  "?exclude=minutely,hourly,daily,alerts&units=si";
            - http_request.get:
                url: !lambda 'return id(weather_url);'
                capture_response: true
                max_response_buffer_size: 2048
                on_response:
                  then:
                    - lambda: |-
                        if (response->status_code != 200) {
                          ESP_LOGW("weather", "HTTP %d from Pirate Weather", response->status_code);
                          return;
                        }
                        json::parse_json(body, [](JsonObject root) -> bool {
                          if (!root["currently"].is<JsonObject>()) {
                            ESP_LOGW("weather", "No 'currently' key in response");
                            return false;
                          }
                          JsonObject cur = root["currently"];

                          const char* summary = cur["summary"] | "Unknown";
                          const char* icon_str = cur["icon"] | "cloudy";
                          id(weather_label) = summary;
                          id(weather_icon) = icon_str;

                          id(weather_temperature) = cur["temperature"] | NAN;
                          id(weather_feels_like) = cur["apparentTemperature"] | NAN;
                          float hum = cur["humidity"] | NAN;
                          id(weather_humidity) = std::isnan(hum) ? NAN : hum * 100.0f;
                          id(weather_wind) = cur["windSpeed"] | NAN;
                          id(weather_precip) = cur["precipIntensity"] | NAN;
                          float cc = cur["cloudCover"] | NAN;
                          id(weather_cloud) = std::isnan(cc) ? NAN : cc * 100.0f;

                          id(weather_fetched) = true;
                          ESP_LOGI("weather", "%s (%s) %.1f°C", summary, icon_str, id(weather_temperature));
                          return true;
                        });
                    - script.execute: weather_update_cards
          else:
            - lambda: 'ESP_LOGD("weather", "Weather not configured (need API key + location)");'

  - id: weather_update_cards
    mode: single
    then:
      - lambda: |-
          if (!id(weather_fetched)) return;

          struct IconMap { const char* pw; const char* glyph; };
          static const IconMap icon_map[] = {
            {"clear-day",          "\U000F0599"},
            {"clear-night",        "\U000F0594"},
            {"cloudy",             "\U000F0590"},
            {"fog",                "\U000F0591"},
            {"partly-cloudy-day",  "\U000F0595"},
            {"partly-cloudy-night","\U000F0F31"},
            {"rain",               "\U000F0597"},
            {"sleet",              "\U000F067F"},
            {"snow",               "\U000F0598"},
            {"thunderstorm",       "\U000F0593"},
            {"wind",               "\U000F059D"},
          };
          const char* glyph = "\U000F0590";
          for (auto &e : icon_map) {
            if (id(weather_icon) == e.pw) { glyph = e.glyph; break; }
          }

          auto &icons = id(weather_icon_lbl_ptrs);
          auto &texts = id(weather_text_lbl_ptrs);
          auto &sensors = id(weather_sensor_lbl_ptrs);
          auto &feeds = id(weather_feed_keys);

          for (size_t i = 0; i < feeds.size(); i++) {
            const std::string &key = feeds[i];
            if (key.empty() || key == "condition") {
              if (i < icons.size() && icons[i]) lv_label_set_text(icons[i], glyph);
              if (i < texts.size() && texts[i]) lv_label_set_text(texts[i], id(weather_label).c_str());
            } else {
              float val = NAN;
              if (key == "temperature")   val = id(weather_temperature);
              else if (key == "feels_like") val = id(weather_feels_like);
              else if (key == "humidity")  val = id(weather_humidity);
              else if (key == "wind")     val = id(weather_wind);
              else if (key == "precip")   val = id(weather_precip);
              else if (key == "cloud")    val = id(weather_cloud);

              char buf[16];
              if (std::isnan(val)) {
                strcpy(buf, "--");
              } else if (key == "humidity" || key == "cloud") {
                snprintf(buf, sizeof(buf), "%.0f", val);
              } else {
                snprintf(buf, sizeof(buf), "%.1f", val);
              }
              if (i < sensors.size() && sensors[i]) lv_label_set_text(sensors[i], buf);
            }
          }

esphome:
  on_boot:
    priority: -200
    then:
      - delay: 5s
      - script.execute: weather_fetch

interval:
  - interval: 15min
    then:
      - script.execute: weather_fetch
